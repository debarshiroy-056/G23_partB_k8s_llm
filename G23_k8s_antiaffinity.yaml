# G23_k8s_antiaffinity.yaml

# ─────────────────────────────────────────────────────────────────────────────
# OVERVIEW: Anti-Affinity Trial Manifest
# ─────────────────────────────────────────────────────────────────────────────
# Identical to the affinity manifest, but with podAntiAffinity forcing the
# worker onto a DIFFERENT hostname than the master. This guarantees all DDP
# gradient synchronization traffic crosses the network and gives us the
# worst-case cross-node runtime for comparison.
#
# This is the workload used by the Phase 1B latency sweep's "red line"
# measurements, where tc netem is layered on top to observe how cross-node
# runtime degrades as injected latency grows.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: electra-master-svc
spec:
  selector:
    role: master
  ports:
    - port: 29500
      targetPort: 29500
---
apiVersion: v1
kind: Pod
metadata:
  name: electra-master
  labels:
    role: master
spec:
  restartPolicy: Never
  containers:
  - name: electra-container
    image: electra-sim:v1
    imagePullPolicy: IfNotPresent
    command: ["python", "G23_electra_train.py"]
    env:
    - name: MASTER_ADDR
      value: "electra-master-svc"
    - name: MASTER_PORT
      value: "29500"
    - name: WORLD_SIZE
      value: "2"
    - name: RANK
      value: "0"
---
apiVersion: v1
kind: Pod
metadata:
  name: electra-worker
  labels:
    role: worker
spec:
  restartPolicy: Never
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: role
            operator: In
            values:
            - master
        topologyKey: kubernetes.io/hostname
  containers:
  - name: electra-container
    image: electra-sim:v1
    imagePullPolicy: IfNotPresent
    command: ["python", "G23_electra_train.py"]
    env:
    - name: MASTER_ADDR
      value: "electra-master-svc"
    - name: MASTER_PORT
      value: "29500"
    - name: WORLD_SIZE
      value: "2"
    - name: RANK
      value: "1"
