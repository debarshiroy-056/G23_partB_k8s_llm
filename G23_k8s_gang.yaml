# G23_k8s_gang.yaml

# ─────────────────────────────────────────────────────────────────────────────
# OVERVIEW: Phase 2 Gang Scheduling Manifest (4 Workers)
# ─────────────────────────────────────────────────────────────────────────────
# Deploys a 4-pod DDP ELECTRA workload (WORLD_SIZE=4, ranks 0-3) where every
# pod uses `schedulerName: gang-scheduler`. All 4 pods remain Pending until
# G23_gang_scheduler.py sees the complete gang and co-schedules them onto
# the detected fast rack.
#
# This is the manifest that produces the 82.11s ± 34.32s result documented
# in the report - demonstrating how aggressive topology packing can trade
# network locality for CPU contention.
#
# Prerequisite: G23_gang_scheduler.py MUST be running before applying this.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: electra-master-svc
spec:
  clusterIP: None
  selector:
    role: master
---
# Pod 1: The Master (Rank 0)
apiVersion: v1
kind: Pod
metadata:
  name: electra-master
  labels:
    role: master
spec:
  schedulerName: gang-scheduler
  restartPolicy: Never
  containers:
  - name: electra-container
    image: electra-sim:v1
    imagePullPolicy: IfNotPresent
    command: ["python", "G23_electra_train.py"]
    env:
    - name: MASTER_ADDR
      value: "electra-master-svc"
    - name: MASTER_PORT
      value: "29500"
    - name: WORLD_SIZE
      value: "4"
    - name: RANK
      value: "0"
---
# Pod 2: Worker 1 (Rank 1)
apiVersion: v1
kind: Pod
metadata:
  name: electra-worker-1
  labels:
    role: worker
spec:
  schedulerName: gang-scheduler
  restartPolicy: Never
  containers:
  - name: electra-container
    image: electra-sim:v1
    imagePullPolicy: IfNotPresent
    command: ["python", "G23_electra_train.py"]
    env:
    - name: MASTER_ADDR
      value: "electra-master-svc"
    - name: MASTER_PORT
      value: "29500"
    - name: WORLD_SIZE
      value: "4"
    - name: RANK
      value: "1"
---
# Pod 3: Worker 2 (Rank 2)
apiVersion: v1
kind: Pod
metadata:
  name: electra-worker-2
  labels:
    role: worker
spec:
  schedulerName: gang-scheduler
  restartPolicy: Never
  containers:
  - name: electra-container
    image: electra-sim:v1
    imagePullPolicy: IfNotPresent
    command: ["python", "G23_electra_train.py"]
    env:
    - name: MASTER_ADDR
      value: "electra-master-svc"
    - name: MASTER_PORT
      value: "29500"
    - name: WORLD_SIZE
      value: "4"
    - name: RANK
      value: "2"
---
# Pod 4: Worker 3 (Rank 3)
apiVersion: v1
kind: Pod
metadata:
  name: electra-worker-3
  labels:
    role: worker
spec:
  schedulerName: gang-scheduler
  restartPolicy: Never
  containers:
  - name: electra-container
    image: electra-sim:v1
    imagePullPolicy: IfNotPresent
    command: ["python", "G23_electra_train.py"]
    env:
    - name: MASTER_ADDR
      value: "electra-master-svc"
    - name: MASTER_PORT
      value: "29500"
    - name: WORLD_SIZE
      value: "4"
    - name: RANK
      value: "3"
