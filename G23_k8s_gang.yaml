    command: ["python", "G23_electra_train.py"]
    env:
    - name: MASTER_ADDR
      value: "electra-master-svc"
    - name: MASTER_PORT
      value: "29500"
    - name: WORLD_SIZE
      value: "4"
    - name: RANK
      value: "2"
---
# Pod 4: Worker 3 (Rank 3)
apiVersion: v1
kind: Pod
metadata:
  name: electra-worker-3
