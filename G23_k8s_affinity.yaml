# G23_k8s_affinity.yaml

# ─────────────────────────────────────────────────────────────────────────────
# OVERVIEW: Affinity Trial Manifest
# ─────────────────────────────────────────────────────────────────────────────
# Deploys a 2-pod DDP ELECTRA workload with podAffinity forcing the worker
# onto the SAME hostname as the master. This eliminates network traffic and
# establishes the best-case-scenario baseline for total execution time.
#
# Components:
#   - electra-master-svc : headless service for RANK 0 discovery.
#   - electra-master     : pod RANK 0, WORLD_SIZE 2.
#   - electra-worker     : pod RANK 1, WORLD_SIZE 2,
#                          with podAffinity -> same hostname as master.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: electra-master-svc
spec:
  selector:
    role: master
  ports:
    - port: 29500
      targetPort: 29500
---
apiVersion: v1
kind: Pod
metadata:
  name: electra-master
  labels:
    role: master
spec:
  restartPolicy: Never
  containers:
  - name: electra-container
    image: electra-sim:v1
    imagePullPolicy: IfNotPresent
    command: ["python", "G23_electra_train.py"]
    env:
    - name: MASTER_ADDR
      value: "electra-master-svc"
    - name: MASTER_PORT
      value: "29500"
    - name: WORLD_SIZE
      value: "2"
    - name: RANK
      value: "0"
---
apiVersion: v1
kind: Pod
metadata:
  name: electra-worker
  labels:
    role: worker
spec:
  restartPolicy: Never
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: role
            operator: In
            values:
            - master
        topologyKey: kubernetes.io/hostname
  containers:
  - name: electra-container
    image: electra-sim:v1
    imagePullPolicy: IfNotPresent
    command: ["python", "G23_electra_train.py"]
    env:
    - name: MASTER_ADDR
      value: "electra-master-svc"
    - name: MASTER_PORT
      value: "29500"
    - name: WORLD_SIZE
      value: "2"
    - name: RANK
      value: "1"
