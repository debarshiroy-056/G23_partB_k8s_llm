# G23_k8s_nemesis.yaml

# ─────────────────────────────────────────────────────────────────────────────
# OVERVIEW: NEMESIS Trial Manifest
# ─────────────────────────────────────────────────────────────────────────────
# Deploys the same 2-pod DDP workload but with `schedulerName: nemesis` on
# both pods. This flag instructs the Kubernetes API to skip the default
# scheduler entirely and wait for our Python controller
# (G23_custom_scheduler.py) to bind the pods via its telemetry-driven
# cost-penalty logic.
#
# Prerequisite: G23_custom_scheduler.py MUST be running in a separate
# terminal (or as a background process) or the pods will stay Pending
# forever.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: electra-master-svc
spec:
  clusterIP: None
  selector:
    role: master
---
apiVersion: v1
kind: Pod
metadata:
  name: electra-master
  labels:
    role: master
spec:
  schedulerName: nemesis  # Triggers your Python Brain!
  restartPolicy: Never
  containers:
  - name: electra-container
    image: electra-sim:v1
    imagePullPolicy: IfNotPresent
    command: ["python", "G23_electra_train.py"]
    env:
    - name: MASTER_ADDR
      value: "electra-master-svc"
    - name: MASTER_PORT
      value: "29500"
    - name: WORLD_SIZE
      value: "2"
    - name: RANK
      value: "0"
---
apiVersion: v1
kind: Pod
metadata:
  name: electra-worker
  labels:
    role: worker
spec:
  schedulerName: nemesis  # Triggers your Python Brain!
  restartPolicy: Never
  containers:
  - name: electra-container
    image: electra-sim:v1
    imagePullPolicy: IfNotPresent
    command: ["python", "G23_electra_train.py"]
    env:
    - name: MASTER_ADDR
      value: "electra-master-svc"
    - name: MASTER_PORT
      value: "29500"
    - name: WORLD_SIZE
      value: "2"
    - name: RANK
      value: "1"
